<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña | Tenerife Glow Ritual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sand: #F5F0E8; --sand-mid: #EDE5D6; --sand-deep: #D6C9B0;
      --stone: #8C7B6B; --stone-dark: #5C4D3E; --obsidian: #1E1A16;
      --gold: #C9A96E; --gold-light: #E8D5A8; --ivory: #FAF7F2; --white: #FFFFFF;
    }
    body { font-family: 'DM Sans', sans-serif; font-weight: 300; background: var(--ivory); color: var(--obsidian); line-height: 1.6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .reset-container { background: var(--white); border: 1px solid var(--sand-deep); border-radius: 8px; padding: 3rem; max-width: 400px; width: 100%; }
    .reset-container h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; color: var(--obsidian); margin-bottom: 0.5rem; }
    .reset-container p { font-size: 14px; color: var(--stone); margin-bottom: 2rem; }
    .field-group { margin-bottom: 1.5rem; }
    .field-label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--stone-dark); margin-bottom: 8px; }
    .styled-input { width: 100%; height: 50px; padding: 0 18px; border: 1px solid var(--sand-deep); border-radius: 2px; background: var(--ivory); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; color: var(--obsidian); outline: none; transition: border-color 0.2s; }
    .styled-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,169,110,0.12); background: var(--white); }
    .btn { width: 100%; height: 50px; background: var(--obsidian); color: var(--ivory); border: none; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.06em; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: var(--stone-dark); }
    .btn:disabled { background: var(--sand-deep); cursor: not-allowed; }
    .message { margin-top: 1rem; padding: 12px 16px; border-radius: 4px; font-size: 13px; line-height: 1.5; display: none; }
    .message.error { background: #fee; border: 1px solid #fcc; color: #900; display: block; }
    .message.success { background: #eef8ee; border: 1px solid #b7dbb7; color: #2f6b2f; display: block; }
  </style>
</head>
<body>

<div class="reset-container">
  <h2>Restablecer contraseña</h2>
  <p>Introduce tu nueva contraseña</p>

  <form id="resetForm">
    <div class="field-group">
      <label class="field-label" for="newPassword">Nueva contraseña</label>
      <input id="newPassword" name="newPassword" class="styled-input" type="password" placeholder="Tu nueva contraseña" required />
    </div>
    <div class="field-group">
      <label class="field-label" for="confirmPassword">Confirmar contraseña</label>
      <input id="confirmPassword" name="confirmPassword" class="styled-input" type="password" placeholder="Confirma tu contraseña" required />
    </div>
    <button type="submit" class="btn" id="submitBtn">Actualizar contraseña</button>
    <div class="message" id="message"></div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  const form = document.getElementById("resetForm");
  const messageBox = document.getElementById("message");
  const submitBtn = document.getElementById("submitBtn");

  function showMessage(text, type) {
    messageBox.textContent = text;
    messageBox.className = "message " + type;
  }

  const hash = window.location.hash;
  console.log("URL hash:", hash);

  if (!hash.includes("type=recovery")) {
    showMessage("Invalid or expired password reset link. Please request a new one.", "error");
    submitBtn.disabled = true;
    return;
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword !== confirmPassword) {
      showMessage("Las contraseñas no coinciden", "error");
      return;
    }

    if (newPassword.length < 6) {
      showMessage("La contraseña debe tener al menos 6 caracteres", "error");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Actualizando...";

    try {
      const { error } = await window.supabaseClient.auth.updateUser({
        password: newPassword
      });

      if (error) {
        showMessage("Error: " + error.message, "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Actualizar contraseña";
      } else {
        showMessage("¡Contraseña actualizada! Redirigiendo a inicio de sesión...", "success");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      }
    } catch (err) {
      showMessage("Error: " + err.message, "error");
      submitBtn.disabled = false;
      submitBtn.textContent = "Actualizar contraseña";
    }
  });
});
</script>
</body>
</html>

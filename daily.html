<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Ritual Diario | Tenerife Glow Ritual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sand: #F5F0E8; --sand-mid: #EDE5D6; --sand-deep: #D6C9B0;
      --stone: #8C7B6B; --stone-dark: #5C4D3E; --obsidian: #1E1A16;
      --gold: #C9A96E; --gold-light: #E8D5A8; --ivory: #FAF7F2; --white: #FFFFFF;
      --sage: #8A9E8A; --radius: 2px; --radius-lg: 6px;
    }
    body { font-family: 'DM Sans', sans-serif; font-weight: 300; background: var(--ivory); color: var(--obsidian); line-height: 1.6; min-height: 100vh; }
    .topbar { position: sticky; top: 0; z-index: 100; background: rgba(250,247,242,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--sand-deep); padding: 0 2.5rem; display: flex; align-items: center; justify-content: space-between; height: 70px; }
    .brand-wrap { display: flex; align-items: center; gap: 14px; }
    .brand-mark { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--gold) 0%, var(--sand-deep) 100%); }
    .eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone); }
    .brand-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 400; color: var(--obsidian); }
    .topbar-right { display: flex; align-items: center; gap: 1.5rem; }
    .language-switcher { display: flex; gap: 4px; }
    .lang-btn { background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; color: var(--stone); cursor: pointer; padding: 4px 8px; border-radius: var(--radius); transition: all 0.2s; }
    .lang-btn:hover, .lang-btn.active { color: var(--obsidian); background: var(--sand-mid); }
    .back-link { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; color: var(--stone); background: none; border: 1px solid var(--sand-deep); padding: 7px 16px; border-radius: var(--radius); cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .back-link:hover { background: var(--sand); color: var(--obsidian); }
    
    .dash-wrap { max-width: 1200px; margin: 0 auto; padding: 2.5rem; }
    .dash-hero { background: var(--obsidian); border-radius: var(--radius-lg); padding: 2.5rem 3rem; margin-bottom: 2rem; display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden; }
    .dash-hero::before { content: ''; position: absolute; top: -60px; right: 80px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(201,169,110,0.12) 0%, transparent 70%); pointer-events: none; }
    .dash-hero-text { position: relative; z-index: 1; }
    .dash-hero-text .eyebrow { color: var(--gold); margin-bottom: 0.5rem; }
    .dash-hero-text h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 2.5vw, 2.2rem); font-weight: 400; color: var(--ivory); line-height: 1.2; margin-bottom: 0.75rem; }
    .dash-hero-text p { font-size: 14px; color: var(--sand-deep); max-width: 500px; line-height: 1.7; }
    
    .btn { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; height: 44px; padding: 0 24px; border-radius: var(--radius); transition: all 0.25s; cursor: pointer; border: none; }
    .btn-primary { background: var(--obsidian); color: var(--ivory); }
    .btn-primary:hover { background: var(--stone-dark); }
    
    .ritual-card { background: var(--white); border: 1px solid var(--sand-deep); padding: 2rem; border-radius: var(--radius-lg); margin-bottom: 2rem; }
    .ritual-card h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 400; color: var(--obsidian); margin-bottom: 1.5rem; }
    .ritual-steps { display: flex; flex-direction: column; gap: 12px; }
    .ritual-step { display: flex; align-items: flex-start; gap: 14px; padding: 1rem 1.25rem; border: 1px solid var(--sand-deep); border-radius: var(--radius); }
    .ritual-step.completed { border-color: rgba(138,158,138,0.3); background: rgba(138,158,138,0.04); }
    .step-checkbox { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--sand-deep); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; cursor: pointer; transition: all 0.2s; font-size: 12px; font-weight: bold; }
    .step-checkbox.checked { background: var(--sage); border-color: var(--sage); color: var(--white); }
    .step-body { flex: 1; }
    .step-title { font-size: 14px; font-weight: 500; color: var(--obsidian); margin-bottom: 3px; }
    .step-time { font-size: 12px; color: var(--stone); }
    .complete-btn { background: var(--obsidian); color: var(--ivory); padding: 12px 32px; margin-top: 1.5rem; width: 100%; }
    .complete-btn:hover { background: var(--stone-dark); }
    
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .dash-hero { animation: fadeUp 0.5s ease both; }
    .ritual-card { animation: fadeUp 0.5s 0.1s ease both; }
    
    @media (max-width: 768px) { .topbar { padding: 0 1.5rem; } .dash-wrap { padding: 1.5rem; } .dash-hero { padding: 2rem 1.5rem; } }
  </style>
</head>
<body>
<div class="page-shell">
  <header class="topbar">
    <div class="brand-wrap">
      <div class="brand-mark"></div>
      <div>
        <p class="eyebrow">Ritual de Piel de la Isla</p>
        <h1 class="brand-title">Tenerife Glow Ritual</h1>
      </div>
    </div>
    <div class="topbar-right">
      <div class="language-switcher">
        <button class="lang-btn active" data-lang="es" type="button">ES</button>
        <button class="lang-btn" data-lang="en" type="button">EN</button>
        <button class="lang-btn" data-lang="fr" type="button">FR</button>
        <button class="lang-btn" data-lang="de" type="button">DE</button>
      </div>
      <a href="dashboard.html" class="back-link">Volver al panel</a>
    </div>
  </header>

  <div class="dash-wrap">
    <div class="dash-hero">
      <div class="dash-hero-text">
        <p class="eyebrow">Tu ritual de hoy</p>
        <h2 id="heroTitle">Completa tu ritual diario</h2>
        <p id="heroCopy">Sigue los pasos de tu ritual personalizado y marca cada uno conforme lo completes.</p>
      </div>
    </div>

    <div class="ritual-card">
      <h3>Mi Ritual de Hoy</h3>
      <div class="ritual-steps" id="ritualSteps"></div>
      <button type="button" class="btn complete-btn" id="completeBtn">Marcar ritual como completado</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  const stepsContainer = document.getElementById("ritualSteps");
  const completeBtn = document.getElementById("completeBtn");
  
  window.supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (!session) {
      console.log("No session, redirecting to login");
      window.location.href = "login.html";
      return;
    }

    console.log("User logged in");
    
    window.tgr.loadDashboardData().then(data => {
      if (!data) {
        window.location.href = "login.html";
        return;
      }

      const onboarding = data.onboarding;
      const dailyMinutes = onboarding?.daily_minutes || 10;
      const currentDay = Math.min(data.daysCompleted + 1, onboarding?.ritual_duration || 90);
      
      const ritualSteps = [];
      if (dailyMinutes >= 5) {
        ritualSteps.push({ title: "Limpieza suave", time: "2-3 min" });
      }
      if (dailyMinutes >= 10) {
        ritualSteps.push({ title: "Tónico o esencia", time: "1 min" });
        ritualSteps.push({ title: "Sérum o tratamiento", time: "2 min" });
      }
      if (dailyMinutes >= 20) {
        ritualSteps.push({ title: "Hidratante o crema", time: "2 min" });
        ritualSteps.push({ title: "Protección solar (día) o aceite (noche)", time: "1 min" });
      }

      stepsContainer.innerHTML = ritualSteps.map((step, idx) => `
        <div class="ritual-step" data-step="${idx}">
          <div class="step-checkbox" onclick="toggleStep(${idx})"></div>
          <div class="step-body">
            <p class="step-title">${step.title}</p>
            <p class="step-time">${step.time}</p>
          </div>
        </div>
      `).join("");

      document.getElementById("heroTitle").textContent = `Día ${currentDay} de tu ritual`;
      document.getElementById("heroCopy").textContent = `Tu ritual personalizado de ${dailyMinutes} minutos. ¡Vamos!`;

      completeBtn.addEventListener("click", function() {
        this.disabled = true;
        this.textContent = "Guardando...";

        window.tgr.completeRitualDay("").then(success => {
          if (success) {
            this.textContent = "¡Completado!";
            setTimeout(() => {
              window.location.href = "dashboard.html";
            }, 1000);
          } else {
            this.disabled = false;
            this.textContent = "Marcar ritual como completado";
            alert("Error al guardar. Intenta de nuevo.");
          }
        });
      });
    }).catch(err => {
      console.error("Error loading data:", err);
      window.location.href = "dashboard.html";
    });
  }).catch(err => {
    console.error("Session error:", err);
    window.location.href = "login.html";
  });
});

function toggleStep(idx) {
  const step = document.querySelector(`[data-step="${idx}"]`);
  const checkbox = step.querySelector(".step-checkbox");
  
  step.classList.toggle("completed");
  checkbox.classList.toggle("checked");
  
  if (checkbox.classList.contains("checked")) {
    checkbox.textContent = "✓";
  } else {
    checkbox.textContent = "";
  }
}
</script>
</body>
</html>
